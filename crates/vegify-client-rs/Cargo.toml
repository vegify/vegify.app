[package]
publish = false
name = "vegify-client-rs"
version = "0.1.0"
edition = "2021"
rust-version = "1.77.2"
description = "The vegify HTTP API client SDK: blocking ureq transport for auth/content/messages/notifications + an OS-keychain session store. Extracted from the desktop app (which consumes this crate); types are the hand mirrors for now, swapping to specta-rust-generated from vegify-api-types when that lands."
license = "MIT"

[lib]
name = "vegify_client"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Blocking HTTP — deliberate: the desktop's sync engine runs on its own thread and wants
# sequential, simple calls (no async runtime in the transport).
ureq = { version = "3", features = ["json", "gzip"] }
# OS keychain session storage; in-memory mock under test/debug builds (see SessionStore).
keyring-core = "1"
tracing = "0.1"
# Shared enums referenced by the wire mirrors (Visibility). A lib dep — apps are leaves, libs stack.
vegify-core = { path = "../vegify-core" }
# Optional: specta Type derives on the wire types, so the desktop's ttipc bindings can register
# them. Off by default — a plain consumer gets no specta in its tree.
specta = { version = "=2.0.0-rc.25", features = ["derive"], optional = true }

[features]
specta = ["dep:specta"]

[lints]
workspace = true

# The real stores are per-OS (keyring-core has no default store; init_keychain_store
# installs the right one). Linux CI compiles without either — tests use the mock.
[target.'cfg(target_os = "macos")'.dependencies]
apple-native-keyring-store = { version = "1", features = ["keychain"] }

[target.'cfg(target_os = "ios")'.dependencies]
apple-native-keyring-store = { version = "1", features = ["protected"] }
