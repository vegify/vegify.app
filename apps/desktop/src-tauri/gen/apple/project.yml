name: vegify
options:
  bundleIdPrefix: app.vegify.ios
  deploymentTarget:
    iOS: 14.0
fileGroups: [../../src]
configs:
  debug: debug
  release: release
settingGroups:
  app:
    base:
      PRODUCT_NAME: vegify
      PRODUCT_BUNDLE_IDENTIFIER: app.vegify.ios
targetTemplates:
  app:
    type: application
    sources:
      - path: Sources
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      groups: [app]
targets:
  vegify_iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
      - path: Externals
      - path: vegify_iOS
      - path: assets
        buildPhase: resources
        type: folder
      - path: LaunchScreen.storyboard
    info:
      path: vegify_iOS/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities: [arm64, metal]
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleShortVersionString: 0.0.0
        CFBundleVersion: "0.0.0"
        # xcodegen regenerates Info.plist from these properties on builds — a key present only in
        # the generated plist gets silently wiped, so the export-compliance answer must live HERE.
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: vegify_iOS/vegify_iOS.entitlements
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      base:
        ENABLE_BITCODE: false
        ARCHS: [arm64]
        VALID_ARCHS: arm64
        LIBRARY_SEARCH_PATHS[arch=x86_64]: $(inherited) $(PROJECT_DIR)/Externals/x86_64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/$(PLATFORM_NAME) $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.0/$(PLATFORM_NAME)
        LIBRARY_SEARCH_PATHS[arch=arm64]: $(inherited) $(PROJECT_DIR)/Externals/arm64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/$(PLATFORM_NAME) $(DEVELOPER_DIR)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift-5.0/$(PLATFORM_NAME)
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: true
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
        DEVELOPMENT_TEAM: T3UN6N5K6Z
        # Device builds sign manually with the pinned App Store profile (the vegify ASC key is
        # App Manager tier and cannot cloud-sign, by design). Committed HERE so xcodegen
        # regeneration carries the settings (the lux #138 lesson: keys living only in generated
        # files get wiped); deploy.yml asserts they resolve before every CI build.
        #
        # The UNSCOPED CODE_SIGN_STYLE is load-bearing and must stay Manual: the tauri CLI reads
        # exactly that key — unscoped, no sdk fallback — to compute the export options it merges
        # over our pinned ExportOptions.plist (tauri-cli 2.11.4 mobile/ios/mod.rs, the
        # `get_build_setting("CODE_SIGN_STYLE")` branch). Leaving it Automatic makes the archive
        # sign manually and then the EXPORT fall back to cloud signing, which dies as
        # "exportArchive No Accounts / No profiles for app.vegify.ios were found" — the vegify ASC
        # key is App Manager tier and cannot cloud-sign. Simulator keeps its own scoped Automatic
        # so `tauri ios dev` is unaffected (simulator signs: CODE_SIGNING_REQUIRED = YES).
        CODE_SIGN_IDENTITY[sdk=iphoneos*]: "Apple Distribution: John Carmack (T3UN6N5K6Z)"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_STYLE[sdk=iphonesimulator*]: Automatic
        CODE_SIGN_STYLE[sdk=iphoneos*]: Manual
        PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]: "vegify iOS App Store 2026-07-18"
      groups: [app]
    dependencies:
      - framework: libapp.a
        embed: false
      - sdk: CoreGraphics.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: Security.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
    preBuildScripts:
      - script: pnpm tauri ios xcode-script -v --platform ${PLATFORM_DISPLAY_NAME:?} --sdk-root ${SDKROOT:?} --framework-search-paths "${FRAMEWORK_SEARCH_PATHS:?}" --header-search-paths "${HEADER_SEARCH_PATHS:?}" --gcc-preprocessor-definitions "${GCC_PREPROCESSOR_DEFINITIONS:-}" --configuration ${CONFIGURATION:?} ${FORCE_COLOR} ${ARCHS:?}
        name: Build Rust Code
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(SRCROOT)/Externals/x86_64/${CONFIGURATION}/libapp.a
          - $(SRCROOT)/Externals/arm64/${CONFIGURATION}/libapp.a
