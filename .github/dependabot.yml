# Dependency updates as config-as-code. Version updates activate the moment this file lands;
# Dependabot ALERTS (vulnerability scanning) are a repository setting flipped separately.
# Grouping keeps the PR volume sane: minor+patch bumps arrive as ONE weekly PR per ecosystem
# (each lands through the normal deploy cascade); majors stay individual so they get real review.
version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      # @types/node tracks Node LTS (CI runs node-version lts/*), so its major follows the
      # runtime, not npm's latest. Bump the major by hand when a new even line reaches Active
      # LTS (next: 26 in Oct 2026); minors/patches keep flowing through the weekly group.
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions-all:
        patterns: ["*"]
    open-pull-requests-limit: 3
