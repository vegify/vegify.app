name: deploy-ci

# Deploys the CI/OIDC stack (VegifyCi) from CI via the dedicated bin/ci.ts app, so
# the GitHub Actions deploy role and the release-signing role — and their
# main-pinned OIDC trust — stay in sync without a local `cdk deploy VegifyCi`.
# bin/ci.ts instantiates only VegifyCi, so no server/web assets are needed (the
# whole-app synth in bin/vegify.ts would otherwise require them). The deploy role
# updates its own stack through the CDK bootstrap roles.

on:
  push:
    branches: [main]
    paths:
      - infra/lib/ci-stack.ts
      - infra/bin/ci.ts
      # deployConfig shapes the VegifyCi synth (bin/ci.ts imports it), so config changes redeploy too.
      - packages/config/**
      - .github/workflows/deploy-ci.yml
  workflow_dispatch:

concurrency:
  group: vegify-deploy-ci
  cancel-in-progress: false

permissions:
  id-token: write # AWS OIDC
  contents: read

jobs:
  deploy-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/vegify-github-deploy
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Deploy VegifyCi
        # Bootstrap is env-driven ON PURPOSE (bin/ci.ts synths with ssm:false): this deploy creates
        # the very grant that lets the deploy role read /vegify/deploy/*, so it must never depend on
        # that grant existing. The Apple secret id rides a repository VARIABLE here (it's an id, not
        # a secret); everything downstream reads the SSM decision instead.
        env:
          APPLE_SIGNING_SECRET_ID: ${{ vars.APPLE_SIGNING_SECRET_ID }}
        run: pnpm --filter @vegify/infra exec cdk --app 'tsx bin/ci.ts' deploy VegifyCi --require-approval never
