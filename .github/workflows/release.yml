name: release

# Production ships ONLY through here (decision A, 2026-06-26). release-please maintains a release PR
# (single monorepo version bump + CHANGELOG) from conventional-commit history; merging it cuts a
# vX.Y.Z tag + GitHub Release, which runs the ORDERED prod deploy (decision-A/B):
#
#   build-server ──▶ build-web ∥ build-desktop ──(all green)──▶ deploy-server ──(/health 200)──▶
#       publish-web ∥ publish-desktop
#
# web/desktop build AFTER the server so they validate against current types; the server deploys before
# the clients that depend on it; desktop is signed + notarized with an Apple Developer ID cert + ASC API
# key stored in Secrets Manager (id via the APPLE_SIGNING_SECRET_ID secret). A normal push to main only
# runs release-please (no deploy); ci.yml handles build+test for pushes/PRs.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to (re)run the deploy for, e.g. v0.1.0"
        required: true

permissions: {}

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: read
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # Mint a short-lived installation token for the release bot App. App-authored pushes and
      # merges trigger follow-on workflows — which GITHUB_TOKEN-authored ones deliberately don't —
      # and unlike the PAT this replaces, the token expires hourly and only carries this repo's
      # grants.
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v7
        with:
          # The App token so the Cargo.lock-sync commit below is pushed as the bot App (an actor
          # whose pushes still trigger the PR's CI, unlike github-actions[bot]).
          token: ${{ steps.app-token.outputs.token }}
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          # The App token (not GITHUB_TOKEN) so the auto-merge below — and the release it cuts — can
          # trigger the follow-on deploy run; GITHUB_TOKEN-authored pushes deliberately don't trigger
          # workflows.
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      # release-type "simple" bumps the crate Cargo.tomls but leaves their entries in the root
      # Cargo.lock stale (the members carry no checksum, so the version is a pure text field). Sync the
      # lock onto the release-PR branch — without invoking cargo — so main never lands a dirty lock.
      - name: Sync Cargo.lock to the release version
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          set -euo pipefail
          PR_BRANCH=$(printf '%s' "$PR_JSON" | jq -r '.headBranchName')
          git fetch --depth=1 origin "$PR_BRANCH"
          git checkout "$PR_BRANCH"
          version=$(jq -r '."."' .release-please-manifest.json)
          VER="$version" perl -0pi -e 's/(name = "vegify-server"\nversion = ")[^"]*/$1$ENV{VER}/' Cargo.lock
          VER="$version" perl -0pi -e 's/(name = "vegify"\nversion = ")[^"]*/$1$ENV{VER}/' Cargo.lock
          if git diff --quiet -- Cargo.lock; then echo "Cargo.lock already in sync at $version"; exit 0; fi
          # Author as the bot App's user (not github-actions[bot]) — with the App-token checkout, the
          # push below is the App's too, so the PR's CI runs without approval.
          login="${{ steps.app-token.outputs.app-slug }}[bot]"
          uid=$(gh api "users/${login}" --jq '.id')
          git config user.name "$login"
          git config user.email "${uid}+${login}@users.noreply.github.com"
          git add Cargo.lock
          git commit -m "chore: sync Cargo.lock to $version"
          git push origin "HEAD:$PR_BRANCH"

      # Fully automatic (decision 2026-06-26): merge the release PR as soon as it's prepared. The merge
      # is App-authored so it triggers the NEXT release run, which detects the merge, cuts the tag +
      # Release, and runs the ordered deploy — whose build+test gate still protects prod. No human gate
      # on the version/CHANGELOG PR itself; conventional commits on main are the only input.
      #
      # Resolve the PR two ways, most-consistent first:
      #   1. steps.release.outputs.pr — release-please's OWN output, populated + immediately consistent
      #      when THIS run just created/updated the PR (no search-index lag).
      #   2. the `autorelease: pending` label — covers the case where release-please left an
      #      already-open PR untouched (output empty). The label SEARCH index lags a few seconds behind
      #      PR creation, so RETRY: a single immediate query raced a freshly-created PR and missed it,
      #      leaving the release PR open + the cascade stalled.
      # Pass the JSON via env as a plain string — never fromJSON() in an expression, which is itself a
      # template error on the empty value.
      - name: Auto-merge the release PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          READ_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_JSON: ${{ steps.release.outputs.pr }}
        run: |
          set -euo pipefail
          PR_NUMBER=$(printf '%s' "${PR_JSON:-}" | jq -r '.number // empty' 2>/dev/null || true)
          if [ -z "$PR_NUMBER" ]; then
            for i in $(seq 1 10); do
              PR_NUMBER=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open \
                --label "autorelease: pending" --json number --jq '.[0].number // empty')
              [ -n "$PR_NUMBER" ] && break
              echo "no labeled release PR yet (attempt $i); retrying in 3s…"
              sleep 3
            done
          fi
          if [ -z "$PR_NUMBER" ]; then
            echo "No open release PR to auto-merge."
            exit 0
          fi
          echo "Auto-merging release PR #$PR_NUMBER — gating on its checks first."
          # An immediate `gh pr merge --squash` would ship a RED build (it once merged a release PR while
          # its ci was still running). Wait for the PR head's check-runs to finish and require they ALL
          # pass. Read them with the default Actions token (READ_TOKEN + `checks: read`) over REST — the
          # App token (GH_TOKEN) can merge but may read no checks here, which silently stranded an
          # earlier gate when a PAT held this seat. Merge with the App token once green so the merge
          # still triggers the deploy run.
          for i in $(seq 1 40); do
            sha=$(GH_TOKEN="$READ_TOKEN" gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" --jq .head.sha 2>/dev/null) || sha=""
            if [ -z "$sha" ]; then echo "could not read #$PR_NUMBER head ($i); waiting 15s…"; sleep 15; continue; fi
            runs=$(GH_TOKEN="$READ_TOKEN" gh api "repos/$GITHUB_REPOSITORY/commits/$sha/check-runs" --jq '.check_runs' 2>/tmp/gherr) || { echo "check-runs read failed:"; cat /tmp/gherr; runs='[]'; }
            total=$(jq 'length' <<<"$runs")
            if [ "$total" -eq 0 ]; then echo "no checks on ${sha:0:7} yet ($i); waiting 15s…"; sleep 15; continue; fi
            pending=$(jq '[.[] | select(.status != "completed")] | length' <<<"$runs")
            if [ "$pending" -gt 0 ]; then echo "$pending/$total check(s) still running ($i)…"; sleep 20; continue; fi
            bad=$(jq '[.[] | select(.conclusion != "success" and .conclusion != "neutral" and .conclusion != "skipped")] | length' <<<"$runs")
            if [ "$bad" -gt 0 ]; then
              echo "::error::release PR #$PR_NUMBER has $bad failing check(s) — refusing to auto-merge:"
              jq -r '.[] | select(.conclusion != "success" and .conclusion != "neutral" and .conclusion != "skipped") | "  \(.name): \(.conclusion)"' <<<"$runs"
              exit 1
            fi
            echo "all $total check(s) passed — merging #$PR_NUMBER."
            gh pr merge "$PR_NUMBER" --squash --repo "$GITHUB_REPOSITORY"
            echo "merged release PR #$PR_NUMBER"
            exit 0
          done
          echo "::error::release PR #$PR_NUMBER checks did not conclude in ~12min — refusing to auto-merge."
          exit 1

  # ── Did this release touch the server? ──────────────────────────────────────────────────────────
  # The web SSR calls the backend on every page, and deploying the backend REPLACES the single t4g.nano
  # instance (a brief 504 window — the EBS data volume is force-detached + re-attached). So deploy the
  # server only when the release actually changed it; a web/desktop/docs-only release skips deploy-server
  # entirely → no instance replacement, no blip. The build jobs still run (they validate, and build-server
  # produces the asset cdk synth needs for every stack) — only the server *deploy* is gated. See docs/deploys.md.
  changes:
    needs: release-please
    if: ${{ always() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      server: ${{ steps.diff.outputs.server }}
    steps:
      - id: tag
        run: echo "tag=${{ github.event.inputs.tag || needs.release-please.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0 # full history + tags, so we can diff this release tag against the previous one
      - id: diff
        run: |
          set -euo pipefail
          # A manual (re)deploy is explicit — always deploy the server (this is the recovery path).
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual dispatch → deploy the server"
            echo "server=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          TAG="${{ steps.tag.outputs.tag }}"
          PREV="$(git tag --sort=-v:refname | grep -vFx "$TAG" | head -n1 || true)"
          if [ -z "$PREV" ] || [ "$PREV" = "$TAG" ]; then
            echo "no previous release tag → deploy the server"
            echo "server=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Diff up to "$TAG^" — the PARENT of the release tag — NOT "$TAG" itself. The release tag is
          # release-please's squash-merged version-bump commit, which edits crates/*/Cargo.toml + Cargo.lock
          # on EVERY release; diffing up to $TAG therefore sees a "server change" every time (this exact
          # false-positive redeployed the server on v0.3.2 for a web-only release). $TAG^ is the last real
          # commit before the bump, so the version churn drops out and only genuine changes remain.
          # Server-relevant paths: the Rust crates (the binary), packages/db (feeds the seed baked into the
          # instance user-data), the server + VPC CDK stacks and the app wiring, and the Cargo manifests.
          # Deliberately NOT infra/lib/web-start-stack.ts — that is WEB infra (publish-web handles it), and
          # is exactly the robots.txt-style release that must NOT redeploy the backend.
          echo "comparing $PREV..$TAG^ (excludes the release version-bump commit) for server-relevant changes"
          if git diff --quiet "$PREV" "$TAG^" -- \
            crates/ packages/db/ \
            infra/lib/server-stack.ts infra/lib/vpc-stack.ts infra/bin/ \
            Cargo.toml Cargo.lock; then
            echo "server unchanged → skipping deploy-server (no backend blip)"
            echo "server=false" >> "$GITHUB_OUTPUT"
          else
            echo "server changed → deploy-server will run"
            echo "server=true" >> "$GITHUB_OUTPUT"
          fi

  # ── Build + test gate ───────────────────────────────────────────────────────────────────────────
  # build-server is the anchor: it resolves the tag, gates the whole orchestration, and (for the
  # cross-musl deployable) carries PR#1's rust-cache + prebuilt cross.
  build-server:
    needs: release-please
    if: ${{ always() && (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout the release tag (private repo)
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - id: tag
        run: echo "tag=${{ github.event.inputs.tag || needs.release-please.outputs.tag_name }}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.tag.outputs.tag }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: aarch64-musl
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      # sccache wraps the native cargo test below. The `cross build` step is NOT wrapped: cross compiles
      # inside a container that has neither the sccache binary nor the GHA cache creds, and feeding both
      # in is fragile + only testable in a live release — that step stays on rust-cache.
      - name: Test the server + shared core
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "true"
          CARGO_INCREMENTAL: "0"
        run: cargo test -p vegify-server -p vegify-core
      - name: Cross-build the aarch64-musl binary + stage the seed
        run: |
          cross build --release --target aarch64-unknown-linux-musl -p vegify-server
          pnpm db:push && pnpm db:seed
          mkdir -p infra/assets
          cp target/aarch64-unknown-linux-musl/release/vegify-server infra/assets/vegify-server
          cp .data/vegify.db infra/assets/seed.db
      - uses: actions/upload-artifact@v4
        with:
          name: server-asset
          path: infra/assets/
          retention-days: 1

  build-web:
    needs: build-server
    # build-server runs under always() (so a skipped release-please on the dispatch path doesn't
    # block it), but GitHub propagates that skipped state transitively to every descendant and
    # auto-skips it — UNLESS the descendant's own if contains a status function (always()/
    # !cancelled()/success()). A bare `needs.*.result == 'success'` is NOT enough: the job is
    # auto-skipped before the condition is ever evaluated. The always() prefix forces evaluation;
    # the result check then enforces the real ordering. Every downstream job needs this shape.
    if: ${{ always() && needs.build-server.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.build-server.outputs.tag }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vegify/tokens build
      - name: Typecheck + unit tests
        run: |
          pnpm typecheck
          pnpm --filter web test
      - name: Build the deployable web bundle (validates against the just-built server)
        env:
          VITE_CLIENT_LOG_URL: /__ingest
          VEGIFY_APPLE_TEAM_ID: ${{ secrets.VEGIFY_APPLE_TEAM_ID }}
        run: pnpm --filter web build:aws
      - uses: actions/upload-artifact@v4
        with:
          name: web-bundle
          # BOTH assets WebStartStack references: the SSR Lambda bundle (.aws-lambda/) and the static
          # client assets (dist/client/) the S3 BucketDeployment ships. Their common ancestor is
          # apps/web, so the artifact is rooted there and consumers download it back into apps/web/.
          path: |
            apps/web/.aws-lambda/
            apps/web/dist/client/
          # .aws-lambda is a dotfile dir; upload-artifact@v4 excludes hidden paths by default, so
          # without this it uploads NOTHING (just a warning) and deploy-server can't find the bundle.
          include-hidden-files: true
          retention-days: 1

  build-desktop:
    needs: build-server
    if: ${{ always() && needs.build-server.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.build-server.outputs.tag }}
      - name: Tauri Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vegify/tokens build
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Regenerate IPC bindings + fail on drift (the up-to-date-types gate)
        run: |
          pnpm --filter desktop gen:bindings
          git diff --quiet -- apps/desktop/src/bindings.ts \
            || { echo "::error::bindings.ts is stale — run 'pnpm --filter desktop gen:bindings' and commit it."; exit 1; }
      - name: Typecheck + build the desktop frontend
        run: |
          pnpm --filter desktop exec tsc --noEmit
          pnpm --filter desktop build

  # ── Deploy: server first, then wait for it to be live ───────────────────────────────────────────
  deploy-server:
    needs: [build-server, build-web, build-desktop, changes]
    # Build gate unchanged (all three green before we touch prod) PLUS the server actually changed. The
    # check is `!= 'false'` (not `== 'true'`) so a failed/empty detection biases to deploy: a needless blip
    # is far cheaper than leaving the backend out of sync with a release that did change it.
    if: ${{ always() && needs.build-server.result == 'success' && needs.build-web.result == 'success' && needs.build-desktop.result == 'success' && needs.changes.outputs.server != 'false' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write # AWS OIDC
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.build-server.outputs.tag }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # cdk synth is whole-app, so every stack's asset must exist even though we deploy only the
      # server here: restore the server binary + the web bundle the upstream jobs already built.
      - uses: actions/download-artifact@v4
        with:
          name: server-asset
          path: infra/assets/
      - uses: actions/download-artifact@v4
        with:
          name: web-bundle
          # Rooted at apps/web (the upload's LCA) → restores apps/web/.aws-lambda/ + apps/web/dist/client/.
          path: apps/web
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - name: Deploy the server
        env:
          ORIGIN_VERIFY_SECRET: ${{ secrets.ORIGIN_VERIFY_SECRET }}
          # The server's systemd env (VEGIFY_PUBLIC_URL, the derived From address) and its SES grant
          # derive from the domain list — the server refuses email sends if these are missing.
          VEGIFY_DOMAIN_NAMES: ${{ secrets.VEGIFY_DOMAIN_NAMES }}
        run: |
          # Absolute path: `pnpm --filter … exec` runs cdk with CWD=infra/, so a bare cdk-out.json
          # would land in infra/ where the next step (CWD=repo root) can't find it.
          pnpm --filter @vegify/infra exec cdk deploy VegifyVpc VegifyServer \
            --require-approval never --outputs-file "$GITHUB_WORKSPACE/cdk-out.json"
      - name: Wait for the server to be live (/health → 200)
        run: |
          set -euo pipefail
          url=$(jq -r '.VegifyServer.Url' "$GITHUB_WORKSPACE/cdk-out.json")
          echo "Polling $url/health"
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$url/health" || echo 000)
            echo "[$i] $code"
            [ "$code" = "200" ] && { echo "server live"; exit 0; }
            sleep 10
          done
          echo "::error::server /health did not return 200 within ~10 min"; exit 1

  # ── Publish the clients in parallel, now that the server they depend on is live ──────────────────
  publish-web:
    needs: [build-server, build-web, build-desktop, deploy-server]
    # Run when all builds are green AND the server is current: deploy-server SUCCEEDED (server changed +
    # deployed) OR was SKIPPED (no server change — the existing backend is already current). A failed or
    # cancelled deploy-server blocks the web publish. Requiring all three builds green keeps the release
    # all-or-nothing — a 'skipped' deploy-server must not let a half-built release slip through.
    if: ${{ always() && needs.build-server.result == 'success' && needs.build-web.result == 'success' && needs.build-desktop.result == 'success' && (needs.deploy-server.result == 'success' || needs.deploy-server.result == 'skipped') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.build-server.outputs.tag }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@v4
        with:
          name: server-asset
          path: infra/assets/
      - uses: actions/download-artifact@v4
        with:
          name: web-bundle
          # Rooted at apps/web (the upload's LCA) → restores apps/web/.aws-lambda/ + apps/web/dist/client/.
          path: apps/web
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - name: Publish the web shell
        env:
          ORIGIN_VERIFY_SECRET: ${{ secrets.ORIGIN_VERIFY_SECRET }}
          # Only the domain list (+ the bring-your-own cert) remain: the backend origin + ingest origin
          # are wired cross-stack, and the hosted zone is looked up from the domain (web-start-stack.ts).
          VEGIFY_DOMAIN_NAMES: ${{ secrets.VEGIFY_DOMAIN_NAMES }}
          VEGIFY_CERT_ARN: ${{ secrets.VEGIFY_CERT_ARN }}
        run: |
          # --exclusively: VegifyWebStart imports from VegifyServer (deployed earlier in the cascade) —
          # without it, cdk would "helpfully" redeploy the server here too, breaking the path-filter
          # promise that web-only releases never replace the backend instance.
          pnpm --filter @vegify/infra exec cdk deploy VegifyWebStart VegifyClientLogs \
            --exclusively --require-approval never

  publish-desktop:
    needs: [build-server, build-web, build-desktop, deploy-server]
    # Same gate as publish-web: all builds green AND deploy-server succeeded-or-was-skipped (see there).
    if: ${{ always() && needs.build-server.result == 'success' && needs.build-web.result == 'success' && needs.build-desktop.result == 'success' && (needs.deploy-server.result == 'success' || needs.deploy-server.result == 'skipped') }}
    runs-on: macos-latest
    permissions:
      contents: write # attach the signed .dmg to the GitHub Release
      id-token: write # AWS OIDC, to read the shared Apple signing secret
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.build-server.outputs.tag }}
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."
      - uses: mozilla-actions/sccache-action@v0.0.10
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vegify/tokens build
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_RELEASE_SIGNING_ROLE_ARN }}
          aws-region: us-west-1
      - name: Load the Apple signing secret
        # Secrets Manager JSON {certificate (.p12 b64), certificate_password, signing_identity, team_id,
        # api_key (.p8), api_key_id, api_issuer_id} -> tauri-action's APPLE_* env. The Developer ID cert
        # + ASC API key are Apple-account-wide; the secret's id is supplied via APPLE_SIGNING_SECRET_ID.
        env:
          APPLE_SIGNING_SECRET_ID: ${{ secrets.APPLE_SIGNING_SECRET_ID }}
        run: |
          set -euo pipefail
          s=$(aws secretsmanager get-secret-value --secret-id "$APPLE_SIGNING_SECRET_ID" --query SecretString --output text)
          echo "::add-mask::$(printf '%s' "$s" | jq -r '.certificate_password')"
          {
            echo "APPLE_CERTIFICATE=$(printf '%s' "$s" | jq -r '.certificate')"
            echo "APPLE_CERTIFICATE_PASSWORD=$(printf '%s' "$s" | jq -r '.certificate_password')"
            echo "APPLE_SIGNING_IDENTITY=$(printf '%s' "$s" | jq -r '.signing_identity')"
            echo "APPLE_TEAM_ID=$(printf '%s' "$s" | jq -r '.team_id')"
            echo "APPLE_API_ISSUER=$(printf '%s' "$s" | jq -r '.api_issuer_id')"
            echo "APPLE_API_KEY=$(printf '%s' "$s" | jq -r '.api_key_id')"
          } >> "$GITHUB_ENV"
          printf '%s' "$s" | jq -r '.api_key' > "$RUNNER_TEMP/asc_api_key.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/asc_api_key.p8" >> "$GITHUB_ENV"
      - name: Inject the Developer ID provisioning profile (authorizes associated-domains at launch)
        # The restricted associated-domains entitlement needs an embedded provisioning profile or amfid
        # refuses to spawn the app. tauri's bundle.macOS.files copies it into Contents/ before signing.
        env:
          VEGIFY_PROVISION_PROFILE_B64: ${{ secrets.VEGIFY_PROVISION_PROFILE_B64 }}
        run: |
          set -euo pipefail
          printf '%s' "$VEGIFY_PROVISION_PROFILE_B64" | openssl base64 -d -A > apps/desktop/src-tauri/embedded.provisionprofile
          echo "provisioning profile: $(wc -c < apps/desktop/src-tauri/embedded.provisionprofile) bytes"
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Baked into the binary via option_env! (apps/desktop/.../data.rs auth_base_url) so the
          # shipped app points at the real backend without the host living in the source tree.
          VEGIFY_API_URL: ${{ secrets.VEGIFY_API_URL }}
        with:
          projectPath: apps/desktop
          tagName: ${{ needs.build-server.outputs.tag }}
          args: --target universal-apple-darwin
