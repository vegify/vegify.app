name: ci

# Build + test on every push to main and on PRs. NO deploy — production ships ONLY through the
# release pipeline (release.yml; decision A, 2026-06-26). This is also what gives PRs status checks.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # PR pushes share a group (a new push cancels the stale run — latest wins). Main pushes get a UNIQUE
  # group per run (github.run_id), so concurrency is a no-op on main: every merged commit's CI runs to
  # completion and is never cancelled by the next merge (each main commit is a permanent state to
  # verify). Rapidly merging a stack no longer cancels the earlier commits' checks.
  group: ci-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: just
      - name: Test the server + shared core (native — the GUI crate is covered in release.yml)
        run: just rust-core

  js:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          cache: pnpm
      - uses: taiki-e/install-action@4684b8405694ae9dd42c9f39ba901a70ae83f4a3 # v2.82.9
        with:
          tool: just
      - run: pnpm install --frozen-lockfile
      # Each step is a `just` recipe — the SAME commands `just check` runs locally, so dev and CI
      # share one source (the justfile) and can't drift (the failure that motivated this).
      - name: Build design tokens (theme.css is gitignored)
        run: just tokens
      - name: Typecheck
        run: just typecheck
      - name: Web unit tests
        run: just web-test
      - name: Build the web + desktop frontends
        run: just build
