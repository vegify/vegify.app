name: ci

# Build + test on every push to main and on PRs. NO deploy — production ships ONLY through the
# release pipeline (release.yml; decision A, 2026-06-26). This is also what gives PRs status checks.
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  # PR pushes share a group (a new push cancels the stale run — latest wins). Main pushes get a UNIQUE
  # group per run (github.run_id), so concurrency is a no-op on main: every merged commit's CI runs to
  # completion and is never cancelled by the next merge (each main commit is a permanent state to
  # verify). Rapidly merging a stack no longer cancels the earlier commits' checks.
  group: ci-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust:
    runs-on: ubuntu-latest
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - name: Test the server + shared core (native — the GUI crate is covered in release.yml)
        run: just rust-core

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: pnpm
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: pnpm install --frozen-lockfile
      # Each step is a `just` recipe — the SAME commands `just check` runs locally, so dev and CI
      # share one source (the justfile) and can't drift (the failure that motivated this).
      - name: Build design tokens (theme.css is gitignored)
        run: just tokens
      - name: Typecheck
        run: just typecheck
      - name: Web unit tests
        run: just web-test
      - name: Build the web + desktop frontends
        run: just build
