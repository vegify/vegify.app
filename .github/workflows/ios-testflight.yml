name: ios-testflight

# iOS build → TestFlight, MANUALLY DISPATCHED (not on the release cascade). It stays out of deploy.yml
# on purpose: until the one-time App Store Connect setup exists (a distribution cert/profile via ASC
# cloud signing + an app record for app.vegify.ios), an automatic per-release run would fail every
# deploy. Once that's in place, run this from the Actions tab (optionally passing a version); it
# archives the Tauri iOS app and uploads it to TestFlight with the SAME Apple ASC API key the desktop
# notarization already uses (Secrets Manager, resolved via SSM) — no new secret.
#
# One-time prerequisites (John, in App Store Connect — see docs/ios.md):
#   1. Create the app record for bundle id `app.vegify.ios`.
#   2. Ensure the ASC API key already in Secrets Manager has the "App Manager" role (it signs + uploads).
# After that this workflow needs nothing else — signing is cloud (automatic), keyed by team id + ASC key.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version (e.g. 0.20.0). Blank = the tauri.conf.json value."
        required: false
        type: string

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  testflight:
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write # AWS OIDC, to read the shared Apple signing secret
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios
      - uses: Swatinem/rust-cache@v2
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vegify/tokens build
      # The bindings generator compiles tauri::generate_context!, which needs apps/desktop/dist to
      # exist — any web build provides it (same ordering just check uses).
      - run: pnpm --filter desktop build

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/vegify-release-signing
          aws-region: us-west-1
      - name: Resolve the backend origin + Apple secret id (from the account, not GitHub)
        run: |
          set -euo pipefail
          region="${{ vars.AWS_REGION || 'us-east-1' }}"
          api_url=$(aws ssm get-parameter --region "$region" --name /vegify/deploy/api-url --query Parameter.Value --output text)
          apple_secret_id=$(aws ssm get-parameter --region "$region" --name /vegify/deploy/apple-secret-id --query Parameter.Value --output text)
          echo "VEGIFY_API_URL=$api_url" >> "$GITHUB_ENV"
          echo "APPLE_SIGNING_SECRET_ID=$apple_secret_id" >> "$GITHUB_ENV"
      - name: Load the Apple ASC API key (cloud signing + upload)
        # Same Secrets Manager JSON the desktop uses; iOS App Store signing needs only the ASC API key
        # + the team id (Xcode's automatic/cloud signing mints the distribution cert & profile).
        run: |
          set -euo pipefail
          s=$(aws secretsmanager get-secret-value --secret-id "$APPLE_SIGNING_SECRET_ID" --query SecretString --output text)
          {
            echo "APPLE_TEAM_ID=$(printf '%s' "$s" | jq -r '.team_id')"
            echo "APPLE_API_ISSUER=$(printf '%s' "$s" | jq -r '.api_issuer_id')"
            echo "APPLE_API_KEY=$(printf '%s' "$s" | jq -r '.api_key_id')"
          } >> "$GITHUB_ENV"
          printf '%s' "$s" | jq -r '.api_key' > "$RUNNER_TEMP/asc_api_key.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/asc_api_key.p8" >> "$GITHUB_ENV"
      - name: Inject the marketing version (if provided)
        # The committed tauri.conf.json version is vestigial; a dispatched version overrides it via a
        # --config merge file (same mechanism as the desktop's tauri.version.json).
        if: ${{ inputs.version != '' }}
        run: printf '{"version":"%s"}\n' "${{ inputs.version }}" > apps/desktop/src-tauri/tauri.version.json
      - name: Build + upload to TestFlight
        env:
          # Baked into the binary via option_env! so the shipped app points at the real backend.
          VEGIFY_API_URL: ${{ env.VEGIFY_API_URL }}
          # The provisioning profile for the restricted associated-domains entitlement (same secret the
          # desktop uses). Written where tauri's bundler expects it.
          VEGIFY_PROVISION_PROFILE_B64: ${{ secrets.VEGIFY_PROVISION_PROFILE_B64 }}
          APPLE_API_KEY_ID: ${{ env.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ env.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          cd apps/desktop
          # `tauri ios build` archives with automatic (cloud) signing keyed by APPLE_TEAM_ID + the ASC
          # API key, then --export-method app-store-connect produces + uploads the TestFlight build.
          # The version override (if injected above) rides in as an extra --config arg.
          if [ -f src-tauri/tauri.version.json ]; then
            pnpm exec tauri ios build --export-method app-store-connect --config src-tauri/tauri.version.json
          else
            pnpm exec tauri ios build --export-method app-store-connect
          fi
