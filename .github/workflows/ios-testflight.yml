name: ios-testflight

# iOS build → TestFlight, MANUALLY DISPATCHED (not on the release cascade). It stays out of deploy.yml
# on purpose: until the one-time App Store Connect setup exists (a distribution cert/profile via ASC
# cloud signing + an app record for app.vegify.ios), an automatic per-release run would fail every
# deploy. Once that's in place, run this from the Actions tab (optionally passing a version); it
# archives the Tauri iOS app and uploads it to TestFlight with the SAME Apple ASC API key the desktop
# notarization already uses (Secrets Manager, resolved via SSM) — no new secret.
#
# One-time prerequisites (John, in App Store Connect — see docs/ios.md):
#   1. Create the app record for bundle id `app.vegify.ios`.
#   2. Ensure the ASC API key already in Secrets Manager has the "App Manager" role (it signs + uploads).
# After that this workflow needs nothing else — signing is cloud (automatic), keyed by team id + ASC key.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version (e.g. 0.20.0). Blank = the tauri.conf.json value."
        required: false
        type: string

concurrency:
  group: ios-testflight
  cancel-in-progress: false

env:
  APPLE_API_KEY: ${{ vars.APPLE_API_KEY }}
  APPLE_TEAM_ID: ${{ vars.APPLE_TEAM_ID }}

jobs:
  testflight:
    runs-on: macos-latest
    permissions:
      contents: read
      id-token: write # AWS OIDC, to read the shared Apple signing secret
    steps:
      - uses: actions/checkout@v7
      - name: Select the newest Xcode 26 (App Store Connect requires the iOS 26 SDK)
        # macos-latest still DEFAULTS to Xcode 16.4 / iOS 18.5 SDK, which ASC rejects at upload
        # (altool 409: "must be built with the iOS 26 SDK or later"). The image ships several 26.x
        # versions; pick the newest present so image updates keep working without edits here.
        run: |
          set -euo pipefail
          xcode=$(find /Applications -maxdepth 1 -name 'Xcode_26*.app' | sort -V | tail -n1)
          sudo xcode-select -s "$xcode"
          echo "selected $xcode"
          xcodebuild -version
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios
      - uses: Swatinem/rust-cache@v2
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vegify/tokens build
      # The bindings generator compiles tauri::generate_context!, which needs apps/desktop/dist to
      # exist — any web build provides it (same ordering just check uses).
      - run: pnpm --filter desktop build

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/vegify-release-signing
          aws-region: us-west-1
      - name: Resolve the backend origin + Apple secret id (from the account, not GitHub)
        run: |
          set -euo pipefail
          region="${{ vars.AWS_REGION || 'us-east-1' }}"
          api_url=$(aws ssm get-parameter --region "$region" --name /vegify/deploy/api-url --query Parameter.Value --output text)
          apple_secret_id=$(aws ssm get-parameter --region "$region" --name /vegify/deploy/apple-secret-id --query Parameter.Value --output text)
          echo "VEGIFY_API_URL=$api_url" >> "$GITHUB_ENV"
          echo "APPLE_SIGNING_SECRET_ID=$apple_secret_id" >> "$GITHUB_ENV"
      - name: Load the Apple ASC API key (cloud signing + upload)
        # Same Secrets Manager JSON the desktop uses; iOS App Store signing needs only the ASC API key
        # + the team id (Xcode's automatic/cloud signing mints the distribution cert & profile).
        run: |
          set -euo pipefail
          s=$(aws secretsmanager get-secret-value --secret-id "$APPLE_SIGNING_SECRET_ID" --query SecretString --output text)
          {
            echo "APPLE_TEAM_ID=$(printf '%s' "$s" | jq -r '.team_id')"
            echo "APPLE_API_ISSUER=$(printf '%s' "$s" | jq -r '.api_issuer_id')"
            echo "APPLE_API_KEY=$(printf '%s' "$s" | jq -r '.api_key_id')"
          } >> "$GITHUB_ENV"
          printf '%s' "$s" | jq -r '.api_key' > "$RUNNER_TEMP/asc_api_key.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/asc_api_key.p8" >> "$GITHUB_ENV"
      - name: Inject the version + signing team (via a --config merge, so the team stays out of the repo)
        # The committed tauri.conf.json version is vestigial (0.0.0) and it has NO iOS bundle config, so
        # the Xcode project signs as the placeholder team "Tauri (unset)". Both are supplied here via a
        # --config merge file (like the desktop's tauri.version.json): a real version (dispatched, else
        # the latest release tag) AND bundle.iOS.developmentTeam (the reliable way to set the Apple team
        # in Tauri v2 — the env var alone didn't reach the generated project). Team id comes from the
        # ASC secret above, never the repo.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          v="${{ inputs.version }}"
          if [ -z "$v" ]; then
            v=$(gh release view --json tagName -q .tagName | sed 's/^v//')
          fi
          jq -n --arg v "$v" --arg team "$APPLE_TEAM_ID" \
            '{version: $v, bundle: {iOS: {developmentTeam: $team}}}' \
            > apps/desktop/src-tauri/tauri.version.json
          echo "iOS build version: $v (team ${APPLE_TEAM_ID:+set})"
      - name: Build + upload to TestFlight
        env:
          # Baked into the binary via option_env! so the shipped app points at the real backend.
          VEGIFY_API_URL: ${{ env.VEGIFY_API_URL }}
          # The provisioning profile for the restricted associated-domains entitlement (same secret the
          # desktop uses). Written where tauri's bundler expects it.
          VEGIFY_PROVISION_PROFILE_B64: ${{ secrets.VEGIFY_PROVISION_PROFILE_B64 }}
          # `tauri ios build` reads the Apple team from APPLE_DEVELOPMENT_TEAM (NOT APPLE_TEAM_ID, which
          # is tauri-action's macOS-notarization var). Without it the export signs as the placeholder
          # team "Tauri (unset)" and fails: "No Account for Team Tauri / No profiles for app.vegify.ios".
          APPLE_DEVELOPMENT_TEAM: ${{ env.APPLE_TEAM_ID }}
          # ASC API key → automatic (cloud) signing: Xcode creates/fetches the App Store provisioning
          # profile for app.vegify.ios on the fly, so there's no cert/profile to manage in the repo.
          APPLE_API_KEY_ID: ${{ env.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ env.APPLE_API_ISSUER }}
        run: |
          set -euo pipefail
          cd apps/desktop
          # `tauri ios build` archives with automatic (cloud) signing keyed by APPLE_DEVELOPMENT_TEAM + the
          # ASC API key, then --export-method app-store-connect EXPORTS an App Store IPA. It does NOT
          # upload — tauri leaves that to altool (below), which is why Tauri's App Store docs show a
          # separate upload command. Skipping it is why a "successful" run left TestFlight with No Builds.
          # The version override (if injected above) rides in as an extra --config arg.
          if [ -f src-tauri/tauri.version.json ]; then
            pnpm exec tauri ios build --export-method app-store-connect --config src-tauri/tauri.version.json
          else
            pnpm exec tauri ios build --export-method app-store-connect
          fi
          # Push the exported IPA to App Store Connect → TestFlight. altool authenticates with the ASC
          # API key, which it discovers as AuthKey_<keyid>.p8 under ~/.appstoreconnect/private_keys.
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$APPLE_API_KEY_PATH" "$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          ipa=$(find src-tauri/gen/apple/build -name '*.ipa' | head -1)
          test -n "$ipa" || { echo "::error::tauri ios build produced no .ipa"; exit 1; }
          # Prove which identity actually signed the shipped app: tauri's interim codesign uses a
          # placeholder ("Apple Distribution: Tauri (unset)") that the App Store export re-signs with
          # the cloud-managed distribution identity — surface the final Authority + TeamIdentifier in
          # the log so a signing regression is visible right next to the upload result.
          unzip -qo "$ipa" -d "$RUNNER_TEMP/ipa-inspect"
          codesign -dvv "$RUNNER_TEMP/ipa-inspect/Payload/"*.app 2>&1 | grep -E 'Authority|TeamIdentifier' \
            || echo "::warning::could not read the ipa's code signature"
          echo "uploading $ipa to App Store Connect"
          xcrun altool --upload-app --type ios --file "$ipa" --apiKey "$APPLE_API_KEY_ID" --apiIssuer "$APPLE_API_ISSUER"
