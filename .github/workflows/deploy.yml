name: deploy

# Production ships on push to main (stormdeck model, adopted 2026-07-04 — replaces the
# release-please → auto-merge train; see docs/deploys.md). Nothing lands on main but human merges:
# releases are SIDE-EFFECTS, not causes — the `release` job tags vX.Y.Z (patch by default) and cuts
# the GitHub Release IN-JOB as a DRAFT, with GITHUB_TOKEN (whose pushes deliberately trigger
# nothing). ARTIFACTS ARE BUILT AT BUILD TIME: build-desktop runs tauri-action (signed universal
# .dmg → attached to the draft), build-ios archives + exports the App Store .ipa, and build-mas
# builds the sandboxed Mac App Store .pkg (both staged as workflow artifacts — TestFlight has no
# draft state, so the upload itself is a PUBLISH step); publish-desktop only FLIPS the draft live
# and publish-ios/publish-mas only UPLOAD once everything landed — a failed deploy never leaves a
# published release or a TestFlight build behind.
#
#   release(draft) ──▶ changes ∥ build-server ∥ build-types(bindings drift + tsc)
#       build-types ──▶ build-web ∥ build-desktop(.dmg → draft) ∥ build-ios(.ipa) ∥ build-mas(.pkg) (released pushes only)
#       all builds green ──▶ deploy-server (path-gated) ──(/health 200)──▶
#       publish-web (path-gated) ∥ publish-desktop (flip draft) ∥ publish-ios (→ TestFlight) ∥ publish-mas (→ TestFlight macOS)
#
# Human levers: `[skip release]` in the merge subject (= the squash-merged PR title) ships
# server/web without cutting a version (and thus without a desktop artifact); `just release
# minor|major` dispatches a bigger bump from main HEAD; `just redeploy vX.Y.Z` re-runs an existing
# tag (the recovery path). Docs-only merges never get here (workflow-level paths filter).
on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "crates/**"
      - "services/**"
      - "packages/**"
      - "infra/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy.yml"
      - ".scripts/**"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump for a fresh release from HEAD (patch|minor|major)"
        required: false
        default: patch
      tag:
        description: "OR: existing tag to (re)deploy, e.g. v0.18.2 — overrides bump"
        required: false

permissions: {}

# One deploy at a time, queued not cancelled — cascades against a shared account must serialize
# (this also removes the workflow-vs-workflow race class the old two-workflow layout had).
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # ── Cut (or resolve) the release BEFORE anything builds ──────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # push the tag + create the Release
    outputs:
      # The git ref every downstream job checks out: the release tag when one exists for this run,
      # else the pushed sha ([skip release]).
      ref: ${{ steps.decide.outputs.ref }}
      # The (draft) GitHub Release's numeric id — empty on [skip release] runs.
      release_id: ${{ steps.decide.outputs.release_id }}
      # X.Y.Z (no leading v) — injected as the desktop bundle version at build time.
      version: ${{ steps.decide.outputs.version }}
      # "true" when a GitHub Release exists for this run — gates publish-desktop (a .dmg is an
      # artifact of a version; [skip release] pushes deploy without one).
      released: ${{ steps.decide.outputs.released }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history + tags: next-version.sh reads the latest v* tag
      - id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          out() { { echo "ref=$1"; echo "version=${2#v}"; echo "released=$3"; } >> "$GITHUB_OUTPUT"; echo "→ ref=$1 version=${2#v} released=$3"; }

          # Recovery path: (re)deploy an existing tag — no new release is cut, but the tag's
          # Release id must still flow downstream: without it, build-desktop's tauri-action
          # builds and signs a .dmg it can attach to nothing (found the hard way — v1.0.2
          # first published with zero assets).
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
            git rev-parse -q --verify "refs/tags/$tag" >/dev/null || { echo "::error::tag $tag not found"; exit 1; }
            gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --draft --verify-tag --generate-notes --title "$tag"
            echo "release_id=$(gh release view "$tag" --json databaseId -q .databaseId)" >> "$GITHUB_OUTPUT"
            out "$tag" "$tag" "true"
            exit 0
          fi

          # [skip release] in the merge subject (= the squash-merged PR title): ship without a version.
          subject=$(git log -1 --pretty=%s)
          if [ "${{ github.event_name }}" = "push" ]; then
            case "$subject" in
              *"[skip release]"*)
                latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
                echo "[skip release] — deploying ${GITHUB_SHA:0:7} without cutting a version (label stays $latest)"
                out "$GITHUB_SHA" "${latest:-v0.0.0}" "false"
                exit 0
                ;;
            esac
          fi

          # Idempotent: a re-run of an already-tagged push reuses its tag + Release.
          if existing=$(git describe --tags --exact-match HEAD 2>/dev/null); then
            echo "HEAD already tagged $existing — reusing"
            gh release view "$existing" >/dev/null 2>&1 || gh release create "$existing" --draft --verify-tag --generate-notes --title "$existing"
            echo "release_id=$(gh release view "$existing" --json databaseId -q .databaseId)" >> "$GITHUB_OUTPUT"
            out "$existing" "$existing" "true"
            exit 0
          fi

          # The normal path: cut the next version (patch per shipping merge; dispatch may bump higher),
          # tag with GITHUB_TOKEN (triggers nothing), and create the Release with generated notes
          # (grouped by PR label via .github/release.yml; PR titles are the changelog). Fresh versions
          # are only ever cut from main — a dispatch pointed at another ref must not tag it.
          if [ "$GITHUB_REF_NAME" != "main" ]; then
            echo "::error::refusing to cut a release from '$GITHUB_REF_NAME' — fresh versions come from main (redeploys use the tag input)"
            exit 1
          fi
          next=$(.scripts/next-version.sh "${{ github.event.inputs.bump || 'patch' }}")
          echo "cutting $next"
          # Annotated tags need a committer identity, which runners don't have (exit 128 without it).
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$next" -m "$next" HEAD
          git push origin "refs/tags/$next"
          # DRAFT until the whole cascade succeeds: build-desktop attaches the signed .dmg to the
          # draft (by id), and publish-desktop flips it live only after deploy-server + publish-web
          # land — a failed deploy never leaves a published release behind.
          gh release create "$next" --draft --verify-tag --generate-notes --title "$next"
          echo "release_id=$(gh release view "$next" --json databaseId -q .databaseId)" >> "$GITHUB_OUTPUT"
          out "$next" "$next" "true"

  # ── What did this push actually change? ──────────────────────────────────────────────────────────
  # The web SSR calls the backend on every page, and deploying the backend REPLACES the single
  # t4g.nano instance (a brief 504 window). Deploy each surface only when its inputs changed; a
  # dispatch is explicit and deploys everything (the recovery path). Diff basis: the push event's
  # before..sha — exactly this push, no tag arithmetic, no bump commits to exclude (none exist).
  changes:
    needs: release
    if: ${{ always() && needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      server: ${{ steps.diff.outputs.server }}
      web: ${{ steps.diff.outputs.web }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - id: diff
        run: |
          set -euo pipefail
          deploy_all() { echo "server=true" >> "$GITHUB_OUTPUT"; echo "web=true" >> "$GITHUB_OUTPUT"; echo "→ $1: deploying everything"; }
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            deploy_all "manual dispatch"; exit 0
          fi
          before="${{ github.event.before }}"
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$before" 2>/dev/null; then
            deploy_all "no usable before-sha (first push / force-push)"; exit 0
          fi
          # Server-relevant: the server crate (services/api) + shared crates (the binary), packages/db
          # (the baked seed), packages/config (deployConfig shapes the server template's env/grants),
          # the server+VPC stacks and app wiring, and the Cargo manifests. Deliberately NOT
          # web-start/client-logs stacks — that's web infra.
          if git diff --quiet "$before" "$GITHUB_SHA" -- \
            services/api/ crates/ packages/db/ packages/config/ \
            infra/lib/server-stack.ts infra/lib/vpc-stack.ts infra/lib/monitoring.ts infra/bin/ \
            Cargo.toml Cargo.lock; then
            echo "server=false" >> "$GITHUB_OUTPUT"; echo "→ server unchanged (no instance replacement)"
          else
            echo "server=true" >> "$GITHUB_OUTPUT"; echo "→ server changed"
          fi
          # Web-relevant: the web app, every shared package, the web-side stacks/lambdas + app wiring.
          if git diff --quiet "$before" "$GITHUB_SHA" -- \
            apps/web/ packages/ \
            infra/lib/web-start-stack.ts infra/lib/client-logs-stack.ts infra/lib/zone.ts infra/lib/monitoring.ts \
            infra/lambda/ infra/bin/ pnpm-lock.yaml; then
            echo "web=false" >> "$GITHUB_OUTPUT"; echo "→ web unchanged"
          else
            echo "web=true" >> "$GITHUB_OUTPUT"; echo "→ web changed"
          fi

  # ── Build + test gate (all-or-nothing: every surface must build before anything deploys) ─────────
  build-server:
    needs: release
    if: ${{ always() && needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Warnings are errors on every compile this job does (test + cross release build) — the same
      # rule the justfile exports for local/CI test runs.
      RUSTFLAGS: -Dwarnings
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release.outputs.ref }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "lts/*"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: aarch64-musl
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: cross
      # sccache wraps the native cargo test below. The `cross build` step is NOT wrapped: cross compiles
      # inside a container that has neither the sccache binary nor the GHA cache creds, and feeding both
      # in is fragile + only testable in a live release — that step stays on rust-cache.
      - name: Test the server + shared core
        env:
          RUSTC_WRAPPER: sccache
          SCCACHE_GHA_ENABLED: "true"
          CARGO_INCREMENTAL: "0"
        run: cargo test -p vegify-server -p vegify-core
      - name: Cross-build the aarch64-musl binary + stage the seed
        run: |
          cross build --release --target aarch64-unknown-linux-musl -p vegify-server
          # The shipped seed DB is SCHEMA-ONLY: fresh installs start with an empty content catalog
          # (the USDA ingest fills it at boot) — demo/sample content is a LOCAL dev concern (just db).
          pnpm db:push
          mkdir -p infra/assets
          cp target/aarch64-unknown-linux-musl/release/vegify-server infra/assets/vegify-server
          cp .data/vegify.db infra/assets/seed.db
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: server-asset
          path: infra/assets/
          retention-days: 1

  build-types:
    # The generated-types gate, every push: regenerate BOTH generated artifacts from the Rust source
    # of truth — the desktop IPC bindings AND @vegify/api-types (the web's wire types) — fail on
    # drift, and typecheck the desktop frontend. build-web and build-desktop both branch off THIS:
    # types before clients, and the web→types edge carries real payload (content.ts imports the
    # generated contract; nothing is hand-mirrored).
    needs: release
    if: ${{ always() && needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      CARGO_INCREMENTAL: "0"
      RUSTFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release.outputs.ref }}
      - name: Tauri Linux build deps (the bindings generator compiles the desktop crate)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "lts/*"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vegify/tokens build
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - name: Regenerate generated types + fail on drift (the up-to-date-types gate)
        run: |
          VEGIFY_REGEN_BINDINGS=1 cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --lib bindings_ts_is_current
          cargo run -p vegify-typegen
          git diff --quiet -- apps/desktop/src/bindings.ts packages/api-types crates/vegify-client-rs/src/generated.rs \
            || { echo "::error::generated types are stale — run 'just bindings' and commit the result."; exit 1; }
      - name: Typecheck the desktop frontend against the fresh types
        run: pnpm --filter desktop exec tsc --noEmit

  build-web:
    needs: [release]
    # build-server runs under always() — GitHub propagates a skipped ancestor transitively and
    # auto-skips descendants UNLESS their own `if` contains a status function; the always() prefix
    # forces evaluation, the result checks enforce the real ordering. Every downstream job needs
    # this shape.
    if: ${{ always() && needs.release.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release.outputs.ref }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "lts/*"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vegify/tokens build
      - name: Typecheck + unit tests
        run: |
          pnpm typecheck
          pnpm --filter web test
      - name: Build the deployable web bundle (validates against the just-built server)
        env:
          VITE_CLIENT_LOG_URL: /__ingest
          # A repository VARIABLE, not a secret — the team id is public by construction (it is served
          # verbatim in the AASA at /.well-known/apple-app-site-association).
          VEGIFY_APPLE_TEAM_ID: ${{ vars.VEGIFY_APPLE_TEAM_ID }}
        run: pnpm --filter web build:aws
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-bundle
          # BOTH assets WebStartStack references: the SSR Lambda bundle (.aws-lambda/) and the static
          # client assets (dist/client/) the S3 BucketDeployment ships. Their common ancestor is
          # apps/web, so the artifact is rooted there and consumers download it back into apps/web/.
          path: |
            apps/web/.aws-lambda/
            apps/web/dist/client/
          # .aws-lambda is a dotfile dir; upload-artifact@v4 excludes hidden paths by default, so
          # without this it uploads NOTHING (just a warning) and deploy-server can't find the bundle.
          include-hidden-files: true
          retention-days: 1

  build-desktop:
    # The REAL desktop artifact is built at BUILD time (was: at publish): regenerate the IPC types,
    # gate on drift, then tauri-action builds/signs/notarizes the universal .dmg and attaches it to
    # the DRAFT release — in parallel with deploy-server. publish-desktop only flips the draft live.
    # [skip release] pushes have no release to attach to → the job skips (PR CI gates the compile).
    needs: [release]
    if: ${{ always() && needs.release.outputs.released == 'true' && needs.release.result == 'success' }}
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: write # upload the signed .dmg to the draft Release
      id-token: write # AWS OIDC, to read the shared Apple signing secret
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      CARGO_INCREMENTAL: "0"
      # The release desktop build is where cfg(debug_assertions) blind spots surface (an unused
      # import only this build could see once shipped a warning) — deny here too.
      RUSTFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release.outputs.ref }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "lts/*"
          cache: pnpm
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: "."
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vegify/tokens build
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/vegify-release-signing
          aws-region: us-west-1
      - name: Resolve deploy parameters (backend origin, Apple secret id)
        # Both come from the account, not GitHub: VegifyServer publishes its origin to
        # /vegify/deploy/api-url (baked into the binary below via option_env!), and the Apple signing
        # secret's id is the /vegify/deploy/apple-secret-id decision. The params live in the deploy
        # region; the job's own region (us-west-1) is where the shared Apple secret lives.
        run: |
          set -euo pipefail
          region="${{ vars.AWS_REGION || 'us-east-1' }}"
          # Assign-then-echo: a failure inside `echo "$(cmd)"` is invisible to set -e (the echo still
          # exits 0). A plain assignment propagates the substitution's exit status, so a missing
          # parameter fails HERE, not two steps later with an empty value.
          api_url=$(aws ssm get-parameter --region "$region" --name /vegify/deploy/api-url --query Parameter.Value --output text)
          apple_secret_id=$(aws ssm get-parameter --region "$region" --name /vegify/deploy/apple-secret-id --query Parameter.Value --output text)
          echo "VEGIFY_API_URL=$api_url" >> "$GITHUB_ENV"
          echo "APPLE_SIGNING_SECRET_ID=$apple_secret_id" >> "$GITHUB_ENV"
      - name: Load the Apple signing secret
        # Secrets Manager JSON {certificate (.p12 b64), certificate_password, signing_identity, team_id,
        # api_key (.p8), api_key_id, api_issuer_id} -> tauri-action's APPLE_* env. The Developer ID cert
        # + ASC API key are Apple-account-wide; the secret's id was resolved from SSM above.
        run: |
          set -euo pipefail
          s=$(aws secretsmanager get-secret-value --secret-id "$APPLE_SIGNING_SECRET_ID" --query SecretString --output text)
          # Register every sensitive field as a log mask BEFORE it can reach a
          # log line (public repo): the Developer ID .p12 base64 cert leaked
          # here previously. Line-by-line covers a multi-line base64 value.
          # (The ASC .p8 api key is written to a file below, never a log.)
          while IFS= read -r line; do [ -n "$line" ] && echo "::add-mask::$line"; done < <(printf '%s' "$s" | jq -r '.certificate')
          echo "::add-mask::$(printf '%s' "$s" | jq -r '.certificate_password')"
          echo "::add-mask::$(printf '%s' "$s" | jq -r '.api_key_id')"
          echo "::add-mask::$(printf '%s' "$s" | jq -r '.api_issuer_id')"
          {
            echo "APPLE_CERTIFICATE=$(printf '%s' "$s" | jq -r '.certificate')"
            echo "APPLE_CERTIFICATE_PASSWORD=$(printf '%s' "$s" | jq -r '.certificate_password')"
            echo "APPLE_SIGNING_IDENTITY=$(printf '%s' "$s" | jq -r '.signing_identity')"
            echo "APPLE_TEAM_ID=$(printf '%s' "$s" | jq -r '.team_id')"
            echo "APPLE_API_ISSUER=$(printf '%s' "$s" | jq -r '.api_issuer_id')"
            echo "APPLE_API_KEY=$(printf '%s' "$s" | jq -r '.api_key_id')"
          } >> "$GITHUB_ENV"
          printf '%s' "$s" | jq -r '.api_key' > "$RUNNER_TEMP/asc_api_key.p8"
          echo "APPLE_API_KEY_PATH=$RUNNER_TEMP/asc_api_key.p8" >> "$GITHUB_ENV"
      - name: Inject the Developer ID provisioning profile (authorizes associated-domains at launch)
        # The restricted associated-domains entitlement needs an embedded provisioning profile or amfid
        # refuses to spawn the app. tauri's bundle.macOS.files copies it into Contents/ before signing.
        env:
          VEGIFY_PROVISION_PROFILE_B64: ${{ secrets.VEGIFY_PROVISION_PROFILE_B64 }}
        run: |
          set -euo pipefail
          printf '%s' "$VEGIFY_PROVISION_PROFILE_B64" | openssl base64 -d -A > apps/desktop/src-tauri/embedded.provisionprofile
          echo "provisioning profile: $(wc -c < apps/desktop/src-tauri/embedded.provisionprofile) bytes"
      - name: Inject the tag-derived bundle version
        # The committed tauri.conf.json version is vestigial ("0.0.0") — the shipped bundle's version
        # comes from the release tag via a --config merge file, so no version-bump commit ever exists.
        run: printf '{"version":"%s"}\n' "${{ needs.release.outputs.version }}" > apps/desktop/src-tauri/tauri.version.json
      - uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # VEGIFY_API_URL rides in from the resolve step (GITHUB_ENV) and is baked into the binary
          # via option_env! so the shipped app points at the real backend without the host living in
          # the source tree or a repository secret.
        with:
          projectPath: apps/desktop
          releaseId: ${{ needs.release.outputs.release_id }}
          args: --target universal-apple-darwin --config src-tauri/tauri.version.json

  build-ios:
    # The iOS App Store artifact, built at BUILD time like the desktop's .dmg: archive + export a
    # signed .ipa and stage it as a workflow artifact. Signing is MANUAL, mirroring the MAS lane:
    # the pinned IOS_APP_STORE provisioning profile rides a repository secret and the Apple
    # Distribution cert comes from the shared MAS signing secret (certs are Apple-account-wide;
    # only the profile is app-specific) — no cloud signing, so the vegify ASC key stays App
    # Manager tier. The ASC UPLOAD is deliberately deferred to publish-ios: TestFlight has no
    # draft state, so uploading before deploy-server succeeds would put a build whose deploy
    # failed in front of testers.
    # [skip release] pushes have no version to stamp → the job skips (PR CI gates the compile).
    needs: [release]
    if: ${{ always() && needs.release.outputs.released == 'true' && needs.release.result == 'success' }}
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write # AWS OIDC, to read the shared Apple signing secret
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release.outputs.ref }}
      - name: Select the newest Xcode 26 (App Store Connect requires the iOS 26 SDK)
        # macos-latest still DEFAULTS to Xcode 16.4 / iOS 18.5 SDK, which ASC rejects at upload
        # (altool 409: "must be built with the iOS 26 SDK or later"). The image ships several 26.x
        # versions; pick the newest present so image updates keep working without edits here.
        run: |
          set -euo pipefail
          xcode=$(find /Applications -maxdepth 1 -name 'Xcode_26*.app' | sort -V | tail -n1)
          sudo xcode-select -s "$xcode"
          echo "selected $xcode"
          xcodebuild -version
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "lts/*"
          cache: pnpm
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          targets: aarch64-apple-ios
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vegify/tokens build
      # The build compiles tauri::generate_context!, which needs apps/desktop/dist to exist — any
      # web build provides it (same ordering just check uses).
      - run: pnpm --filter desktop build
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/vegify-release-signing
          aws-region: us-west-1
      - name: Resolve the backend origin + signing secret ids (from the account, not GitHub)
        run: |
          set -euo pipefail
          region="${{ vars.AWS_REGION || 'us-east-1' }}"
          api_url=$(aws ssm get-parameter --region "$region" --name /vegify/deploy/api-url --query Parameter.Value --output text)
          apple_secret_id=$(aws ssm get-parameter --region "$region" --name /vegify/deploy/apple-secret-id --query Parameter.Value --output text)
          mas_secret_id=$(aws ssm get-parameter --region "$region" --name /vegify/deploy/mas-secret-id --query Parameter.Value --output text)
          {
            echo "VEGIFY_API_URL=$api_url"
            echo "APPLE_SIGNING_SECRET_ID=$apple_secret_id"
            echo "MAS_SIGNING_SECRET_ID=$mas_secret_id"
          } >> "$GITHUB_ENV"
      - name: Import the Apple Distribution identity + install the pinned profile
        # Mirrors build-mas exactly: the account-wide Apple Distribution .p12 from the shared
        # MAS signing secret goes into an ephemeral keychain that IS added to the search list.
        # (tauri 2.11's own IOS_CERTIFICATE lane creates a keychain xcodebuild cannot see, and
        # its pbxproj writer drops brand-new keys outside buildSettings — both verified against
        # this project — so this job signs the explicit way instead.) The pinned App Store
        # profile is installed under BOTH profile directories (Xcode 16+ reads UserData). Cert
        # and password are masked before anything can reach a log (the #158 rule); only the
        # identity and profile NAMES travel via GITHUB_ENV.
        env:
          VEGIFY_IOS_PROVISION_PROFILE_B64: ${{ secrets.VEGIFY_IOS_PROVISION_PROFILE_B64 }}
        run: |
          set -euo pipefail
          test -n "$VEGIFY_IOS_PROVISION_PROFILE_B64" || { echo "::error::VEGIFY_IOS_PROVISION_PROFILE_B64 secret is unset — the iOS build cannot sign without the pinned App Store profile"; exit 1; }
          s=$(aws secretsmanager get-secret-value --secret-id "$APPLE_SIGNING_SECRET_ID" --query SecretString --output text)
          echo "APPLE_TEAM_ID=$(printf '%s' "$s" | jq -r '.team_id')" >> "$GITHUB_ENV"
          mas=$(aws secretsmanager get-secret-value --secret-id "$MAS_SIGNING_SECRET_ID" --query SecretString --output text)
          cert_pw=$(printf '%s' "$mas" | jq -r '.certificate_password')
          while IFS= read -r line; do [ -n "$line" ] && echo "::add-mask::$line"; done < <(printf '%s' "$mas" | jq -r '.certificate')
          echo "::add-mask::$cert_pw"
          printf '%s' "$mas" | jq -r '.certificate' | openssl base64 -d -A > "$RUNNER_TEMP/ios-dist.p12"
          echo "IOS_SIGNING_IDENTITY=$(printf '%s' "$mas" | jq -r '.signing_identity')" >> "$GITHUB_ENV"
          keychain="$RUNNER_TEMP/ios-signing.keychain-db"
          keychain_pw=$(openssl rand -hex 16)
          security create-keychain -p "$keychain_pw" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_pw" "$keychain"
          security import "$RUNNER_TEMP/ios-dist.p12" -k "$keychain" -P "$cert_pw" -T /usr/bin/codesign
          # What lets codesign use the key without a UI prompt no runner could answer.
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_pw" "$keychain" > /dev/null
          security list-keychains -d user -s "$keychain" login.keychain-db
          profile="$RUNNER_TEMP/vegify-ios.mobileprovision"
          printf '%s' "$VEGIFY_IOS_PROVISION_PROFILE_B64" | openssl base64 -d -A > "$profile"
          uuid=$(security cms -D -i "$profile" | plutil -extract UUID raw -o - -)
          name=$(security cms -D -i "$profile" | plutil -extract Name raw -o - -)
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles" "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          cp "$profile" "$HOME/Library/MobileDevice/Provisioning Profiles/$uuid.mobileprovision"
          cp "$profile" "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles/$uuid.mobileprovision"
          echo "IOS_PROFILE_NAME=$name" >> "$GITHUB_ENV"
          echo "installed profile '$name' ($uuid)"
      - name: Assert manual signing resolves + pin the export options
        # The manual-signing settings are COMMITTED, sdk-scoped, in gen/apple/project.yml and
        # the generated project (simulator dev stays automatic). This step only ASSERTS they
        # resolve via -showBuildSettings — a regeneration that drops them must fail the job
        # here, not surface as xcodebuild's misleading "requires a provisioning profile with
        # the Associated Domains feature".
        run: |
          set -euo pipefail
          cd apps/desktop/src-tauri/gen/apple
          settings=$(xcodebuild -workspace vegify.xcodeproj/project.xcworkspace/ -scheme vegify_iOS -configuration release -sdk iphoneos -showBuildSettings 2>/dev/null)
          echo "$settings" | grep -q "CODE_SIGN_STYLE = Manual" || { echo "::error::manual signing did not resolve in build settings"; exit 1; }
          echo "$settings" | grep -q "PROVISIONING_PROFILE_SPECIFIER = $IOS_PROFILE_NAME" || { echo "::error::the provisioning profile specifier did not resolve in build settings"; exit 1; }
          # tauri merges a project-dir ExportOptions.plist with the options it computes, and its
          # pbxproj PARSER cannot read these quoted values back (the archive signs, then the
          # export dies with "requires a provisioning profile") — so hand it the manual-signing
          # export options directly instead of hoping it re-derives them.
          # TRIPWIRE: if a future @tauri-apps/cli bump fixes tauri#15741 (the parser), its
          # computed options will overlap this file — re-test the merge interplay on that bump
          # before trusting a release.
          cat > ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>$APPLE_TEAM_ID</string>
            <key>signingCertificate</key><string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>app.vegify.ios</key><string>$IOS_PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          PLIST
          plutil -lint ExportOptions.plist
          echo "signing resolved: Manual / $IOS_PROFILE_NAME (+ export options pinned)"
      - name: Inject the tag-derived version + signing team (via a --config merge)
        # Version comes from THIS run's release (no `gh release view` race against the draft flip);
        # the team id comes from the ASC secret. Committed version fields stay vestigial 0.0.0.
        run: |
          set -euo pipefail
          jq -n --arg v "${{ needs.release.outputs.version }}" --arg team "$APPLE_TEAM_ID" \
            '{version: $v, bundle: {iOS: {developmentTeam: $team}}}' \
            > apps/desktop/src-tauri/tauri.version.json
          echo "iOS build version: ${{ needs.release.outputs.version }} (team ${APPLE_TEAM_ID:+set})"
      - name: Build + export the App Store .ipa
        env:
          # Baked into the binary via option_env! so the shipped app points at the real backend.
          VEGIFY_API_URL: ${{ env.VEGIFY_API_URL }}
          # `tauri ios build` reads the Apple team from APPLE_DEVELOPMENT_TEAM (NOT APPLE_TEAM_ID,
          # which is tauri-action's macOS-notarization var).
          APPLE_DEVELOPMENT_TEAM: ${{ env.APPLE_TEAM_ID }}
          # No signing env vars on purpose: the identity lives in the search-listed keychain,
          # the profile is installed on disk, and the project already says Manual + specifier
          # (previous step, asserted). tauri reads those settings into its export options.
        run: |
          set -euo pipefail
          cd apps/desktop
          pnpm exec tauri ios build --export-method app-store-connect --config src-tauri/tauri.version.json
          ipa=$(find src-tauri/gen/apple/build -name '*.ipa' | head -1)
          test -n "$ipa" || { echo "::error::tauri ios build produced no .ipa"; exit 1; }
          # Prove which identity actually signed the shipped app: tauri's interim codesign uses a
          # placeholder ("Apple Distribution: Tauri (unset)") that the App Store export re-signs
          # with the Apple Distribution identity from the pinned profile.
          unzip -qo "$ipa" -d "$RUNNER_TEMP/ipa-inspect"
          codesign -dvv "$RUNNER_TEMP/ipa-inspect/Payload/"*.app 2>&1 | grep -E 'Authority|TeamIdentifier' \
            || echo "::warning::could not read the ipa's code signature"
          cp "$ipa" "$RUNNER_TEMP/vegify.ipa"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ios-ipa
          path: ${{ runner.temp }}/vegify.ipa
          retention-days: 1

  build-mas:
    # The Mac App Store artifact: the SAME app as the .dmg, but sandboxed (Entitlements.mas.plist),
    # signed with the Apple Distribution identity, and wrapped in an installer-signed .pkg by
    # productbuild. Deliberately NOT notarized (App Store Connect ingestion runs its own checks) and
    # NOT attached to the GitHub Release (a MAS-signed .pkg only runs with a store receipt — it is
    # submission material, not a download). Unlike iOS there is no cloud signing outside xcodebuild,
    # so the Apple Distribution + Mac Installer Distribution certs come from the shared MAS signing
    # secret and are imported into an ephemeral keychain. Staged as a workflow artifact; publish-mas
    # uploads it only after deploy-server is live. [skip release] pushes skip (no version to stamp).
    needs: [release]
    if: ${{ always() && needs.release.outputs.released == 'true' && needs.release.result == 'success' }}
    runs-on: macos-latest
    timeout-minutes: 45
    permissions:
      contents: read
      id-token: write # AWS OIDC, to read the MAS signing secret
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"
      CARGO_INCREMENTAL: "0"
      # Same rule as build-desktop: the release build is where cfg(debug_assertions) blind spots
      # surface — deny warnings here too.
      RUSTFLAGS: -Dwarnings
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release.outputs.ref }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "lts/*"
          cache: pnpm
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: "."
      - uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @vegify/tokens build
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/vegify-release-signing
          aws-region: us-west-1
      - name: Resolve deploy parameters (backend origin, MAS secret id)
        run: |
          set -euo pipefail
          region="${{ vars.AWS_REGION || 'us-east-1' }}"
          api_url=$(aws ssm get-parameter --region "$region" --name /vegify/deploy/api-url --query Parameter.Value --output text)
          mas_secret_id=$(aws ssm get-parameter --region "$region" --name /vegify/deploy/mas-secret-id --query Parameter.Value --output text)
          echo "VEGIFY_API_URL=$api_url" >> "$GITHUB_ENV"
          echo "MAS_SIGNING_SECRET_ID=$mas_secret_id" >> "$GITHUB_ENV"
      - name: Load the MAS signing secret + import identities into an ephemeral keychain
        # Secrets Manager JSON {certificate (Apple Distribution .p12 b64), certificate_password,
        # signing_identity, installer_certificate (Mac Installer Distribution .p12 b64),
        # installer_certificate_password, installer_identity}. Certs are Apple-account-wide (shared
        # with lux); only the provisioning profile is app-specific (injected in the next step).
        # Passwords stay step-local; only the two identity NAMES go to GITHUB_ENV.
        run: |
          set -euo pipefail
          s=$(aws secretsmanager get-secret-value --secret-id "$MAS_SIGNING_SECRET_ID" --query SecretString --output text)
          cert_pw=$(printf '%s' "$s" | jq -r '.certificate_password')
          inst_pw=$(printf '%s' "$s" | jq -r '.installer_certificate_password')
          echo "::add-mask::$cert_pw"
          echo "::add-mask::$inst_pw"
          printf '%s' "$s" | jq -r '.certificate' | openssl base64 -d -A > "$RUNNER_TEMP/mas-dist.p12"
          printf '%s' "$s" | jq -r '.installer_certificate' | openssl base64 -d -A > "$RUNNER_TEMP/mas-installer.p12"
          {
            echo "MAS_SIGNING_IDENTITY=$(printf '%s' "$s" | jq -r '.signing_identity')"
            echo "MAS_INSTALLER_IDENTITY=$(printf '%s' "$s" | jq -r '.installer_identity')"
          } >> "$GITHUB_ENV"
          keychain="$RUNNER_TEMP/mas-signing.keychain-db"
          keychain_pw=$(openssl rand -hex 16)
          security create-keychain -p "$keychain_pw" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_pw" "$keychain"
          security import "$RUNNER_TEMP/mas-dist.p12" -k "$keychain" -P "$cert_pw" -T /usr/bin/codesign
          security import "$RUNNER_TEMP/mas-installer.p12" -k "$keychain" -P "$inst_pw" -T /usr/bin/productbuild
          # What lets codesign/productbuild use the keys without a UI prompt no runner could answer.
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_pw" "$keychain" > /dev/null
          security list-keychains -d user -s "$keychain" login.keychain-db
      - name: Inject the Mac App Store provisioning profile + team-scoped entitlements
        # The MAS profile is app-specific (app.vegify.ios + Associated Domains) and rides the same
        # channel as the Developer ID profile: a repository secret. Unlike the Developer ID
        # placeholder path, a store upload with a missing/garbage profile is a guaranteed rejection —
        # fail loudly HERE. The team id substitutes the committed __APPLE_TEAM_ID__ placeholder in
        # Entitlements.mas.plist (same pattern as the AASA; it is public by construction).
        env:
          VEGIFY_MAS_PROVISION_PROFILE_B64: ${{ secrets.VEGIFY_MAS_PROVISION_PROFILE_B64 }}
          VEGIFY_APPLE_TEAM_ID: ${{ vars.VEGIFY_APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          test -n "$VEGIFY_MAS_PROVISION_PROFILE_B64" || { echo "::error::VEGIFY_MAS_PROVISION_PROFILE_B64 secret is unset — the MAS build cannot ship without the embedded Mac App Store profile"; exit 1; }
          test -n "$VEGIFY_APPLE_TEAM_ID" || { echo "::error::VEGIFY_APPLE_TEAM_ID variable is unset"; exit 1; }
          mkdir -p apps/desktop/src-tauri/mas
          printf '%s' "$VEGIFY_MAS_PROVISION_PROFILE_B64" | openssl base64 -d -A > apps/desktop/src-tauri/mas/embedded.provisionprofile
          echo "MAS provisioning profile: $(wc -c < apps/desktop/src-tauri/mas/embedded.provisionprofile) bytes"
          sed -i '' "s/__APPLE_TEAM_ID__/$VEGIFY_APPLE_TEAM_ID/g" apps/desktop/src-tauri/Entitlements.mas.plist
      - name: Compose the MAS build config (tag-derived version × store overrides)
        # One merged --config file: the tag version (committed fields stay vestigial 0.0.0) deep-
        # merged with tauri.mas.json (app-only target, sandbox entitlements, MAS profile).
        run: |
          set -euo pipefail
          printf '{"version":"%s"}\n' "${{ needs.release.outputs.version }}" > apps/desktop/src-tauri/tauri.version.json
          jq -s '.[0] * .[1]' apps/desktop/src-tauri/tauri.version.json apps/desktop/src-tauri/tauri.mas.json > apps/desktop/src-tauri/tauri.mas.merged.json
      - name: Build the sandboxed .app + wrap the installer-signed .pkg
        env:
          # Baked into the binary via option_env! so the shipped app points at the real backend.
          VEGIFY_API_URL: ${{ env.VEGIFY_API_URL }}
          # Apple Distribution — picked out of the ephemeral keychain by tauri's codesign step.
          APPLE_SIGNING_IDENTITY: ${{ env.MAS_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          cd apps/desktop
          pnpm exec tauri build --target universal-apple-darwin --config src-tauri/tauri.mas.merged.json
          app=$(find "$GITHUB_WORKSPACE/target/universal-apple-darwin/release/bundle/macos" -maxdepth 1 -name '*.app' | head -1)
          test -n "$app" || { echo "::error::tauri build produced no .app bundle"; exit 1; }
          # Refuse to stage an unsandboxed build — ingestion would reject it anyway, later + vaguer.
          codesign -d --entitlements - "$app" 2>/dev/null | grep -q 'app-sandbox' || { echo "::error::built app is NOT sandboxed — Entitlements.mas.plist did not apply"; exit 1; }
          codesign -dvv "$app" 2>&1 | grep -E 'Authority|TeamIdentifier' || echo "::warning::could not read the app's code signature"
          xcrun productbuild --sign "$MAS_INSTALLER_IDENTITY" --component "$app" /Applications "$RUNNER_TEMP/vegify-mas.pkg"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mas-pkg
          path: ${{ runner.temp }}/vegify-mas.pkg
          retention-days: 1

  # ── Deploy: server first, then wait for it to be live ───────────────────────────────────────────
  deploy-server:
    # Gated on ALL build jobs: nothing touches prod unless every artifact of this push built
    # (build-desktop/build-ios/build-mas count as satisfied when skipped — [skip release] pushes
    # build none of them).
    needs: [release, changes, build-types, build-server, build-web, build-desktop, build-ios, build-mas]
    # Build gate unchanged (all builds green before we touch prod) PLUS the server actually changed. The
    # check is `!= 'false'` (not `== 'true'`) so a failed/empty detection biases to deploy: a needless blip
    # is far cheaper than leaving the backend out of sync with a push that did change it.
    if: ${{ always() && needs.build-types.result == 'success' && needs.build-server.result == 'success' && needs.build-web.result == 'success' && (needs.build-desktop.result == 'success' || needs.build-desktop.result == 'skipped') && (needs.build-ios.result == 'success' || needs.build-ios.result == 'skipped') && (needs.build-mas.result == 'success' || needs.build-mas.result == 'skipped') && needs.changes.outputs.server != 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      id-token: write # AWS OIDC
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release.outputs.ref }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "lts/*"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # cdk synth is whole-app, so every stack's asset must exist even though we deploy only the
      # server here: restore the server binary + the web bundle the upstream jobs already built.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: server-asset
          path: infra/assets/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-bundle
          # Rooted at apps/web (the upload's LCA) → restores apps/web/.aws-lambda/ + apps/web/dist/client/.
          path: apps/web
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          # Constructed, not stored: the role name is fixed by ci-stack.ts, so the only GitHub-side
          # fact is the account id (a repository VARIABLE — role ARNs aren't secrets).
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/vegify-github-deploy
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Deploy the server
        # No env: the domain list + email derivations come from the account's own SSM decisions
        # (/vegify/deploy/*, written once by `just init`) — deployConfig reads them at synth.
        run: |
          # Absolute path: `pnpm --filter … exec` runs cdk with CWD=infra/, so a bare cdk-out.json
          # would land in infra/ where the next step (CWD=repo root) can't find it.
          pnpm --filter @vegify/infra exec cdk deploy VegifyVpc VegifyServer \
            --require-approval never --outputs-file "$GITHUB_WORKSPACE/cdk-out.json"
      - name: Wait for the server to be live (/health → 200)
        run: |
          set -euo pipefail
          url=$(jq -r '.VegifyServer.Url' "$GITHUB_WORKSPACE/cdk-out.json")
          echo "Polling $url/health"
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$url/health" || echo 000)
            echo "[$i] $code"
            [ "$code" = "200" ] && { echo "server live"; exit 0; }
            sleep 10
          done
          echo "::error::server /health did not return 200 within ~10 min"; exit 1

  # ── Publish the clients in parallel, now that the server they depend on is live ──────────────────
  publish-web:
    needs: [release, changes, build-types, build-server, build-web, build-desktop, build-ios, build-mas, deploy-server]
    # All builds green AND the server is current: deploy-server SUCCEEDED (server changed + deployed)
    # OR was SKIPPED (no server change — the existing backend is already current). A failed/cancelled
    # deploy-server blocks the web publish. Web itself is path-gated (same bias-to-deploy rule).
    if: ${{ always() && needs.build-types.result == 'success' && needs.build-server.result == 'success' && needs.build-web.result == 'success' && (needs.build-desktop.result == 'success' || needs.build-desktop.result == 'skipped') && (needs.build-ios.result == 'success' || needs.build-ios.result == 'skipped') && (needs.build-mas.result == 'success' || needs.build-mas.result == 'skipped') && (needs.deploy-server.result == 'success' || needs.deploy-server.result == 'skipped') && needs.changes.outputs.web != 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.release.outputs.ref }}
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "lts/*"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: server-asset
          path: infra/assets/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-bundle
          path: apps/web
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/vegify-github-deploy
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}
      - name: Publish the web shell
        # No env: the domain list, cert override, backend origin, ingest origin, hosted zone, and
        # origin-verify secret are all either SSM decisions (/vegify/deploy/*), cross-stack wiring,
        # lookups, or generated in-account — nothing GitHub-side remains.
        run: |
          # --exclusively: VegifyWebStart imports from VegifyServer (deployed earlier in the cascade) —
          # without it, cdk would "helpfully" redeploy the server here too, breaking the path-filter
          # promise that web-only pushes never replace the backend instance.
          pnpm --filter @vegify/infra exec cdk deploy VegifyWebStart VegifyClientLogs \
            --exclusively --require-approval never

  publish-desktop:
    # The artifact already exists (build-desktop attached the signed .dmg to the DRAFT release at
    # build time) — publishing is just flipping the draft live, and only after the same gate
    # publish-web clears: nothing announces a version whose deploy didn't land.
    needs: [release, changes, build-types, build-server, build-web, build-desktop, build-ios, build-mas, deploy-server]
    if: ${{ always() && needs.release.outputs.released == 'true' && needs.build-types.result == 'success' && needs.build-server.result == 'success' && needs.build-web.result == 'success' && needs.build-desktop.result == 'success' && needs.build-ios.result == 'success' && needs.build-mas.result == 'success' && (needs.deploy-server.result == 'success' || needs.deploy-server.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write # publish the Release
    steps:
      - name: Flip the draft release live
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ needs.release.outputs.ref }}" --repo "$GITHUB_REPOSITORY" --draft=false

  publish-ios:
    # The .ipa already exists (build-ios staged it as a workflow artifact) — "publishing" is the
    # altool push to App Store Connect, behind the same gate the other publishes clear. TestFlight
    # has no draft state, so this sequencing is what keeps a failed deploy away from testers.
    needs: [release, changes, build-types, build-server, build-web, build-desktop, build-ios, build-mas, deploy-server]
    if: ${{ always() && needs.release.outputs.released == 'true' && needs.build-types.result == 'success' && needs.build-server.result == 'success' && needs.build-web.result == 'success' && needs.build-desktop.result == 'success' && needs.build-ios.result == 'success' && needs.build-mas.result == 'success' && (needs.deploy-server.result == 'success' || needs.deploy-server.result == 'skipped') }}
    runs-on: macos-latest # xcrun altool is Apple's uploader — macOS only (the default Xcode is fine for uploads)
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # AWS OIDC, to read the ASC API key
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ios-ipa
          path: ${{ runner.temp }}
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/vegify-release-signing
          aws-region: us-west-1
      - name: Load the ASC API key (upload credential)
        run: |
          set -euo pipefail
          region="${{ vars.AWS_REGION || 'us-east-1' }}"
          apple_secret_id=$(aws ssm get-parameter --region "$region" --name /vegify/deploy/apple-secret-id --query Parameter.Value --output text)
          s=$(aws secretsmanager get-secret-value --secret-id "$apple_secret_id" --query SecretString --output text)
          {
            echo "APPLE_API_ISSUER=$(printf '%s' "$s" | jq -r '.api_issuer_id')"
            echo "APPLE_API_KEY=$(printf '%s' "$s" | jq -r '.api_key_id')"
          } >> "$GITHUB_ENV"
          printf '%s' "$s" | jq -r '.api_key' > "$RUNNER_TEMP/asc_api_key.p8"
      - name: Upload to TestFlight (duplicate-tolerant for redeploys)
        run: |
          set -euo pipefail
          # altool discovers the key as AuthKey_<keyid>.p8 under ~/.appstoreconnect/private_keys.
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$RUNNER_TEMP/asc_api_key.p8" "$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY}.p8"
          rc=0
          out=$(xcrun altool --upload-app --type ios --file "$RUNNER_TEMP/vegify.ipa" \
            --apiKey "$APPLE_API_KEY" --apiIssuer "$APPLE_API_ISSUER" 2>&1) || rc=$?
          echo "$out"
          if [ "$rc" -ne 0 ]; then
            # `just redeploy vX.Y.Z` re-runs a tag whose build may already be on ASC — Apple rejects
            # the duplicate, and that rejection IS the desired end state, not a failure.
            echo "$out" | grep -qiE 'already been uploaded|already exists|redundant binary|previously uploaded' \
              && { echo "build already on App Store Connect — treating as published"; exit 0; }
            exit "$rc"
          fi

  publish-mas:
    # The macOS twin of publish-ios: the sandboxed .pkg already exists (build-mas staged it) —
    # "publishing" is the altool push to App Store Connect (macOS TestFlight), behind the same gate.
    # Universal purchase: the iOS and macOS builds land on the SAME app record (same app.vegify.ios
    # bundle id); each platform's store submission stays a deliberate ASC-side step.
    needs: [release, changes, build-types, build-server, build-web, build-desktop, build-ios, build-mas, deploy-server]
    if: ${{ always() && needs.release.outputs.released == 'true' && needs.build-types.result == 'success' && needs.build-server.result == 'success' && needs.build-web.result == 'success' && needs.build-desktop.result == 'success' && needs.build-ios.result == 'success' && needs.build-mas.result == 'success' && (needs.deploy-server.result == 'success' || needs.deploy-server.result == 'skipped') }}
    runs-on: macos-latest # xcrun altool is Apple's uploader — macOS only (the default Xcode is fine for uploads)
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write # AWS OIDC, to read the ASC API key
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mas-pkg
          path: ${{ runner.temp }}
      - uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/vegify-release-signing
          aws-region: us-west-1
      - name: Load the ASC API key (upload credential)
        run: |
          set -euo pipefail
          region="${{ vars.AWS_REGION || 'us-east-1' }}"
          apple_secret_id=$(aws ssm get-parameter --region "$region" --name /vegify/deploy/apple-secret-id --query Parameter.Value --output text)
          s=$(aws secretsmanager get-secret-value --secret-id "$apple_secret_id" --query SecretString --output text)
          {
            echo "APPLE_API_ISSUER=$(printf '%s' "$s" | jq -r '.api_issuer_id')"
            echo "APPLE_API_KEY=$(printf '%s' "$s" | jq -r '.api_key_id')"
          } >> "$GITHUB_ENV"
          printf '%s' "$s" | jq -r '.api_key' > "$RUNNER_TEMP/asc_api_key.p8"
      - name: Upload to App Store Connect (duplicate-tolerant for redeploys)
        run: |
          set -euo pipefail
          # altool discovers the key as AuthKey_<keyid>.p8 under ~/.appstoreconnect/private_keys.
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$RUNNER_TEMP/asc_api_key.p8" "$HOME/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY}.p8"
          rc=0
          out=$(xcrun altool --upload-app --type macos --file "$RUNNER_TEMP/vegify-mas.pkg" \
            --apiKey "$APPLE_API_KEY" --apiIssuer "$APPLE_API_ISSUER" 2>&1) || rc=$?
          echo "$out"
          if [ "$rc" -ne 0 ]; then
            # Same rule as publish-ios: a redeployed tag's build may already be on ASC — the
            # duplicate rejection IS the desired end state, not a failure.
            echo "$out" | grep -qiE 'already been uploaded|already exists|redundant binary|previously uploaded' \
              && { echo "build already on App Store Connect — treating as published"; exit 0; }
            exit "$rc"
          fi
