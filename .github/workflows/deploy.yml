name: deploy

# Deploys the web + backend to AWS on merge to main: VegifyWebStart (stateless SSR shell),
# VegifyServer (standing Axum backend), and VegifyClientLogs (browser-log ingestion). Auth is OIDC —
# no stored AWS secrets: the job assumes the least-privilege vegify-github-deploy role
# (infra/lib/ci-stack.ts), which can only assume the CDK bootstrap roles. One-time bootstrap of that
# role: `cdk deploy VegifyCi`. (Hardening TODO: pin these actions to commit SHAs instead of major tags.)

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/**"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "infra/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-web-start
  cancel-in-progress: false

permissions:
  id-token: write # mint the OIDC token to assume the AWS role
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6 # version comes from package.json's packageManager field
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build design tokens (theme.css is gitignored)
        run: pnpm --filter @vegify/tokens build
      - name: Create + seed the DB (.data is gitignored; staged below as the vegify-server seed)
        run: pnpm db:push && pnpm db:seed
      - name: Build vegify-server (aarch64 musl static, for the t4g/Graviton box) + stage the seed
        run: |
          cargo install cross --locked
          cross build --release --target aarch64-unknown-linux-musl -p vegify-server
          mkdir -p infra/assets
          cp target/aarch64-unknown-linux-musl/release/vegify-server infra/assets/vegify-server
          cp .data/vegify.db infra/assets/seed.db
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::123456789012:role/vegify-github-deploy
          aws-region: us-east-1
      # Browser-log ingestion is FIRST-PARTY: the client beacons a same-origin POST to /__ingest, which
      # the VegifyWebStart CloudFront distribution forwards to the VegifyClientLogs Lambda Function URL.
      # So the client endpoint is a static same-origin path (no stack-output plumbing) — and same-origin
      # means no CORS preflight AND ad/tracking blockers don't drop it (a raw cross-origin lambda-url
      # telemetry beacon gets silently blocked). One build (it's also the asset the full-app synth reads).
      - name: Build web-start AWS bundle (self-contained SSR; bakes in the /__ingest beacon path)
        env:
          VITE_CLIENT_LOG_URL: /__ingest
        run: pnpm --filter web build:aws
      - name: cdk deploy
        env:
          # Origin-verify secret CloudFront injects on the Function URL origins so the Lambdas can reject
          # direct (non-CloudFront) hits. Both stacks bake it in at synth; unset → hardening off (fail-open).
          ORIGIN_VERIFY_SECRET: ${{ secrets.ORIGIN_VERIFY_SECRET }}
        run: |
          pnpm --filter @vegify/infra exec cdk deploy \
            VegifyVpc VegifyWebStart VegifyServer VegifyClientLogs --require-approval never
